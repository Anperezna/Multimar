server {
    # Puerto HTTP publico de la aplicacion.
    listen 3000;
    server_name localhost;
    root /var/www/html/public;
    index index.php index.html;

    location / {
        # Si no existe archivo fisico, Laravel resuelve la ruta por index.php.
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # Backend PHP-FPM en la red interna de Docker Compose.
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        # Evita timeouts cortos en requests pesadas.
        fastcgi_read_timeout 300;
    }

    location ~* \.(?:css|js|jpg|jpeg|gif|png|svg|ico|woff2?)$ {
        # Cache para estaticos y menor carga en PHP.
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri /index.php?$query_string;
    }

    # Limite maximo de tamano de subida por request.
    client_max_body_size 20M;
}
