# Configuracion minima de Nginx para Laravel en contenedor monolitico.
# Escucha en el puerto 3000 y envia PHP a php-fpm (puerto interno 9000).
server {
    listen 3000;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    location / {
        # Si el archivo no existe, Laravel maneja la ruta via index.php.
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        # Conexion local con php-fpm dentro del mismo contenedor.
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;
    }
}
