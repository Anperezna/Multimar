# Limite de memoria por proceso PHP.
memory_limit=512M
# Limites de subida HTTP (debe ser coherente con Nginx).
upload_max_filesize=20M
post_max_size=20M
# Tiempo maximo de ejecucion por request.
max_execution_time=120
# Zona horaria por defecto en runtime.
date.timezone=Europe/Madrid
# Cache de bytecode para mejorar rendimiento.
opcache.enable=1
opcache.enable_cli=1
# En desarrollo, recompila cuando detecta cambios en archivos.
opcache.validate_timestamps=1
# Numero maximo de scripts cacheados por opcache.
opcache.max_accelerated_files=20000
