name: aviso-merge-master

on:
  pull_request:
    branches:
      - master
    types:
      - closed

permissions:
  contents: read

jobs:
  enviar-correo-equipo:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Enviar correo al equipo
        uses: dawidd6/action-send-mail@v3
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: '[Multimar] PR fusionado a master'
          to: ${{ secrets.TEAM_EMAILS || secrets.SMTP_USERNAME }}
          from: ${{ secrets.MAIL_FROM || secrets.SMTP_USERNAME }}
          body: |
            Se ha fusionado un pull request a la rama master.

            Titulo: ${{ env.PR_TITLE }}
            Autor: ${{ env.PR_AUTHOR }}
            Enlace: ${{ env.PR_URL }}
