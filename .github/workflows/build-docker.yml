name: construir-y-publicar-docker

# Se ejecuta cuando hay cambios en la rama master.
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - closed

jobs:
  construir-publicar:
    if: github.event_name == 'push' || github.event.pull_request.merged == true
    # Compila la imagen y la publica en Docker Hub.
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Iniciar sesion en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Construir y publicar imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/multimar-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/multimar-app:${{ github.sha }}
